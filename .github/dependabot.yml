# ============================================================
# 🤖 Dependabot — 自动维护依赖
# ============================================================
# 自动检测 Python 依赖和 GitHub Actions 的版本更新，
# 每周检查一次，发现更新自动提交 PR。
#
# 省去手动检查版本的心智负担，同时保持安全性。
# ============================================================

version: 2
updates:
  # Python 依赖 (pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore"
      include: "scope"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Shanghai"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore"
      include: "scope"
