# ============================================================
# 🤖 日常灵感工作流 — AI 自动分析（批量）
# ============================================================
# 一次性分析所有未分析的灵感，不限于最新那篇。
#
# 成本策略（三档回退）:
#   1️⃣ GitHub Models (免费) — 用 GITHUB_TOKEN，零成本
#   2️⃣ DeepSeek (低价)      — 用 DEEPSEEK_API_KEY
#   3️⃣ OpenAI (付费兜底)    — 用 OPENAI_API_KEY
# ============================================================

name: 🤖 灵感自动分析

on:
  push:
    paths:
      - "01_原始灵感/**/description.md"
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 10

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Batch analyze all pending inspirations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python _scripts/batch_analyze.py

      - name: Commit results
        run: |
          git config user.name "灵感机器人"
          git config user.email "bot@inspiration-workflow"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto: AI batch analysis [skip ci]"
            git push
            echo "Committed"
          fi