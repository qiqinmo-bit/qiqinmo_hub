name: Insp Process

on:
  push:
    paths:
      - "01_原始灵感/**"
      - "02_灵感分析/**"
      - "03_知识文档/**"
    paths-ignore:
      - "_memory/**"
      - "04_知识网络/**"
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run auto-update
        run: python _scripts/process_inspiration.py --auto

      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@localhost"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "auto: update index & graph [skip ci]"
            git push
          fi