# ============================================================
# 🕸️ 日常灵感工作流 — GitHub Pages 知识图谱发布
# ============================================================
# 每次 push 到 04_知识网络/graph_data.json 时自动更新
# 发布到 https://你的用户名.github.io/仓库名/
#
# 必须在 GitHub 仓库 Settings → Pages 中设置:
#   Source: GitHub Actions
# ============================================================

name: 🕸️ 知识图谱 Pages

on:
  push:
    paths:
      - "04_知识网络/graph_data.json"
      - "docs/**"
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: ⬇️ 检出仓库
        uses: actions/checkout@v4

      - name: ⚙️ 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 📂 上传 docs/ 目录
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: 🚀 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
