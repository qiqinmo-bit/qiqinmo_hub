<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收图夹 — 实时监控</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .badge {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 12px;
    margin-left: 8px;
  }
  .badge.running { background: #238636; color: #fff; }
  .badge.stopped { background: #da3633; color: #fff; }
  .badge.processing { background: #d29922; color: #fff; }

  .stats { display: flex; gap: 20px; }
  .stat-item { text-align: center; }
  .stat-item .num { font-size: 22px; font-weight: 700; }
  .stat-item .label { font-size: 11px; color: #8b949e; margin-top: 2px; }

  .progress-bar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 14px 24px;
  }
  .progress-steps {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    max-width: 700px;
    margin: 0 auto;
  }
  .step-item { display: flex; align-items: center; gap: 0; }
  .step-circle {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid #30363d;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    flex-shrink: 0;
    background: #0d1117;
    color: #484f58;
    transition: all 0.4s ease;
    position: relative;
  }
  .step-circle .step-label {
    position: absolute;
    top: 34px;
    font-size: 11px;
    white-space: nowrap;
    color: #484f58;
    font-weight: 400;
    transition: color 0.4s ease;
  }
  .step-circle.active {
    border-color: #d29922;
    background: #d29922;
    color: #0d1117;
    box-shadow: 0 0 12px rgba(210,153,34,0.4);
  }
  .step-circle.active .step-label { color: #d29922; }
  .step-circle.done {
    border-color: #3fb950;
    background: #3fb950;
    color: #0d1117;
  }
  .step-circle.done .step-label { color: #3fb950; }
  .step-connector {
    width: 40px;
    height: 3px;
    background: #21262d;
    transition: background 0.4s ease;
    flex-shrink: 0;
    margin: 0 4px;
  }
  .step-connector.done { background: #3fb950; }
  .step-connector.active { background: #d29922; }

  .log-area {
    flex: 1;
    overflow-y: auto;
    padding: 12px 24px 24px;
    font-family: "Cascadia Code", "JetBrains Mono", "Fira Code", monospace;
    font-size: 13px;
    line-height: 1.6;
  }
  .log-area .log-entry {
    padding: 2px 0;
    border-bottom: 1px solid #21262d;
    display: flex;
    gap: 8px;
  }
  .log-time { color: #484f58; min-width: 60px; flex-shrink: 0; }
  .log-msg { word-break: break-all; }
  .log-msg.ok { color: #3fb950; }
  .log-msg.info { color: #58a6ff; }
  .log-msg.warn { color: #d29922; }
  .log-msg.err { color: #f85149; }
  .log-msg.save { color: #bc8cff; }
  .log-msg.push { color: #79c0ff; }
  .log-msg.skip { color: #8b949e; }
  .log-msg.clean { color: #484f58; }

  .stall-banner {
    background: #3d1f00;
    border-bottom: 1px solid #d29922;
    padding: 8px 24px;
    display: none;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #d29922;
    animation: pulse-warn 2s ease-in-out infinite;
  }
  .stall-banner.visible { display: flex; }
  .stall-banner .stall-icon { font-size: 18px; }
  .stall-banner .stall-msg { flex: 1; }
  .stall-banner .stall-action {
    background: #d29922;
    color: #0d1117;
    border: none;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 600;
  }
  @keyframes pulse-warn {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.85; }
  }

  .gh-panel {
    background: #161b22;
    border-top: 1px solid #30363d;
    padding: 10px 24px;
    display: flex;
    gap: 16px;
    font-size: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .gh-panel .gh-title {
    color: #8b949e;
    font-weight: 600;
    margin-right: 4px;
  }
  .gh-panel .gh-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .gh-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .gh-dot.success { background: #3fb950; }
  .gh-dot.failure { background: #f85149; }
  .gh-dot.pending { background: #d29922; }
  .gh-dot.offline { background: #484f58; }
  .gh-panel a { color: #58a6ff; text-decoration: none; }
  .gh-panel a:hover { text-decoration: underline; }

  .footer {
    background: #161b22;
    border-top: 1px solid #30363d;
    padding: 10px 24px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #8b949e;
  }
  .footer a { color: #58a6ff; text-decoration: none; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #484f58;
    gap: 12px;
  }
  .empty-state .icon { font-size: 48px; }
  .empty-state .hint { font-size: 14px; }

  @media (max-width: 600px) {
    .header { padding: 12px 16px; }
    .stats { gap: 12px; }
    .stat-item .num { font-size: 18px; }
    .log-area { padding: 8px 16px; font-size: 12px; }
    .step-connector { width: 20px; }
    .step-circle { width: 24px; height: 24px; font-size: 10px; }
    .step-circle .step-label { font-size: 9px; top: 30px; }
    .gh-panel { flex-direction: column; gap: 6px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <span style="font-size:20px;">📸</span>
    <span style="font-weight:600;margin-left:6px;">收图夹监控</span>
    <span class="badge running" id="statusBadge">运行中</span>
      <span class="badge" id="modelBadge" style="background:#484f58;color:#fff">模型: -</span>
  </div>
  <div class="stats">
    <div class="stat-item">
      <div class="num" id="todayCount">0</div>
      <div class="label">今日处理</div>
    </div>
    <div class="stat-item">
      <div class="num" id="totalEntries">0</div>
      <div class="label">总条目</div>
    </div>
    <div class="stat-item">
      <div class="num" id="uptime">-</div>
      <div class="label">状态</div>
    </div>
  </div>
</div>

<div class="progress-bar">
  <div class="progress-steps" id="progressSteps">
    <div class="step-item">
      <div class="step-circle" data-step="0">
        <span>📥</span>
        <span class="step-label">等待</span>
      </div>
    </div>
    <div class="step-connector" data-connector="1"></div>
    <div class="step-item">
      <div class="step-circle" data-step="1">
        <span>🔍</span>
        <span class="step-label">发现</span>
      </div>
    </div>
    <div class="step-connector" data-connector="2"></div>
    <div class="step-item">
      <div class="step-circle" data-step="2">
        <span>👁️</span>
        <span class="step-label">OCR</span>
      </div>
    </div>
    <div class="step-connector" data-connector="3"></div>
    <div class="step-item">
      <div class="step-circle" data-step="3">
        <span>💾</span>
        <span class="step-label">入库</span>
      </div>
    </div>
    <div class="step-connector" data-connector="4"></div>
    <div class="step-item">
      <div class="step-circle" data-step="4">
        <span>📊</span>
        <span class="step-label">索引</span>
      </div>
    </div>
    <div class="step-connector" data-connector="5"></div>
    <div class="step-item">
      <div class="step-circle" data-step="5">
        <span>🚀</span>
        <span class="step-label">推送</span>
      </div>
    </div>
    <div class="step-connector" data-connector="6"></div>
    <div class="step-item">
      <div class="step-circle" data-step="6">
        <span>✅</span>
        <span class="step-label">完成</span>
      </div>
    </div>
  </div>
</div>

<div class="stall-banner" id="stallBanner">
  <span class="stall-icon">!</span>
  <span class="stall-msg" id="stallMsg">处理超时</span>
  <button class="stall-action" onclick="location.reload()">查看状态</button>
</div>

<div class="log-area" id="logContainer">
  <div class="empty-state" id="emptyState">
    <div class="icon">⏳</div>
    <div class="hint">等待收图夹处理截图...</div>
    <div style="font-size:12px;color:#30363d;">把截图放进 收图夹/ 文件夹</div>
  </div>
</div>

<div class="gh-panel" id="ghPanel">
  <span class="gh-title">GitHub Actions</span>
  <span class="gh-item"><span class="gh-dot offline"></span>加载中...</span>
</div>

<div class="footer">
  <span>收图夹: 本地</span>
  <span><a href="https://github.com/qiqinmo-bit/qiqinmo_hub/actions" target="_blank">GitHub Actions</a></span>
</div>

<script>
const STEP_NAMES = ['等待', '发现', 'OCR', '入库', '索引', '推送', '完成'];

function updateProgress(step) {
  document.querySelectorAll('.step-circle').forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i < step) el.classList.add('done');
    else if (i === step) el.classList.add('active');
  });
  document.querySelectorAll('.step-connector').forEach((el, i) => {
    el.classList.remove('active', 'done');
    if (i < step) el.classList.add('done');
    else if (i === step && step < 6) el.classList.add('active');
  });
}

function msgClass(log) {
  const t = log.type || '';
  const m = (log.msg || '').toLowerCase();
  if (t === 'complete') return 'ok';
  if (t === 'skip') return 'skip';
  if (t === 'error' || t === 'err') return 'err';
  if (t === 'push') return 'push';
  if (t === 'save') return 'save';
  if (t === 'warn') return 'warn';
  if (m.includes('成功') || m.includes('完成')) return 'ok';
  if (m.includes('错误') || m.includes('失败') || m.includes('跳过')) return 'err';
  if (m.includes('推送')) return 'push';
  if (m.includes('保存') || m.includes('入库')) return 'save';
  if (m.includes('发现') || m.includes('处理')) return 'info';
  if (m.includes('清理')) return 'clean';
  return 'info';
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

const logContainer = document.getElementById('logContainer');
const emptyState = document.getElementById('emptyState');

function addLog(log) {
  if (emptyState) emptyState.remove();
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = '<span class="log-time">' + escapeHtml(log.time || '') + '</span><span class="log-msg ' + msgClass(log) + '">' + escapeHtml(log.msg || '') + '</span>';
  logContainer.appendChild(entry);
  logContainer.scrollTop = logContainer.scrollHeight;
}

async function loadLogs() {
  try {
    const resp = await fetch('/api/logs?tail=100');
    const logs = await resp.json();
    for (const log of logs) addLog(log);
  } catch(e) {}
}

 async function updateModelInfo() {
  try {
    const resp = await fetch('/api/model-info');
    const m = await resp.json();
    const badge = document.getElementById('modelBadge');
    if (m.tier === 'none') {
      badge.textContent = '模型: 暂无记录';
      badge.style.background = '#484f58';
    } else if (m.tier === 'rule_fallback') {
      badge.textContent = '模型: 本地规则';
      badge.style.background = '#d29922';
    } else if (m.success) {
      const label = m.label.replace(/[()]/g, '').trim();
      const short = label.includes('GitHub') ? 'GitHub' : label.includes('DeepSeek') ? 'DeepSeek' : label.includes('OpenAI') ? 'OpenAI' : label;
      badge.textContent = '模型: ' + short;
      badge.style.background = '#238636';
      badge.title = m.label + ' (' + m.model + ') ✔️ ' + m.time;
    } else {
      badge.textContent = '\u6a21\u578b: \u5931\u8d25';
      badge.style.background = '#da3633';
    }
  } catch(e) {}
}

async function updateStatus() {
  try {
    const resp = await fetch('/api/status');
    const s = await resp.json();
    document.getElementById('todayCount').textContent = s.today;
    document.getElementById('totalEntries').textContent = s.total_entries;
    updateProgress(s.step || 0);

    const badge = document.getElementById('statusBadge');
    if (s.watcher === 'running') {
      if (s.step > 0 && s.step < 6) {
        badge.textContent = '处理中';
        badge.className = 'badge processing';
      } else {
        badge.textContent = '运行中';
        badge.className = 'badge running';
      }
      document.getElementById('uptime').textContent = '活跃';
    } else {
      badge.textContent = '已停止';
      badge.className = 'badge stopped';
      document.getElementById('uptime').textContent = '离线';
    }

    const banner = document.getElementById('stallBanner');
    const stallMsg = document.getElementById('stallMsg');
    if (s.stalled) {
      const sn = STEP_NAMES[s.stalled_step] || '未知';
      stallMsg.textContent = '处理超时! [' + sn + '] 卡住 ' + s.stalled_seconds + ' 秒';
      banner.classList.add('visible');
    } else {
      banner.classList.remove('visible');
    }
  } catch(e) {}
}

async function updateGhStatus() {
  try {
    const resp = await fetch('/api/gh-status');
    const gh = await resp.json();
    const panel = document.getElementById('ghPanel');
    const wfs = gh.workflows || {};
    const names = Object.keys(wfs);
    if (names.length === 0) {
      panel.innerHTML = '<span class="gh-title">GitHub Actions</span><span class="gh-item"><span class="gh-dot offline"></span>无法连接</span>';
      return;
    }
    let html = '<span class="gh-title">GitHub Actions</span>';
    for (const name of names) {
      const w = wfs[name];
      let dot = 'offline';
      if (w.conclusion === 'success') dot = 'success';
      else if (w.conclusion === 'failure') dot = 'failure';
      else if (w.status === 'queued' || w.status === 'in_progress') dot = 'pending';

      let label = w.conclusion || w.status;
      let shortName = name.replace('.github/workflows/', '').replace('.yml', '');
      if (shortName.length > 25) shortName = shortName.slice(0, 22) + '...';
      html += '<span class="gh-item">';
      html += '<span class="gh-dot ' + dot + '"></span>';
      html += '<a href="' + w.url + '" target="_blank">' + shortName + '</a>';
      html += '<span style="color:#8b949e">' + label + '</span>';
      html += '</span>';
    }
    if (gh.offline) {
      html += '<span style="color:#484f58">(离线缓存)</span>';
    }
    panel.innerHTML = html;
  } catch(e) {
    document.getElementById('ghPanel').innerHTML = '<span class="gh-title">GitHub Actions</span><span class="gh-item"><span class="gh-dot offline"></span>连接失败</span>';
  }
}

let lastLogs = [];
function connectSSE() {
  const evtSource = new EventSource('/stream');
  evtSource.onmessage = function(e) {
    try {
      const logs = JSON.parse(e.data);
      for (const log of logs) {
        const key = log.time + log.msg;
        if (!lastLogs.includes(key)) {
          lastLogs.push(key);
          if (lastLogs.length > 200) lastLogs.shift();
          addLog(log);
        }
      }
      updateStatus();
    } catch(e) {}
  };
  evtSource.onerror = function() {
    setTimeout(connectSSE, 3000);
  };
}

setInterval(async () => {
  try {
    const resp = await fetch('/api/logs?tail=5');
    const logs = await resp.json();
    for (const log of logs) {
      if (!lastLogs.includes(log.time + log.msg)) {
        lastLogs.push(log.time + log.msg);
        addLog(log);
      }
    }
    updateStatus();
  } catch(e) {}
}, 3000);

setInterval(updateGhStatus, 60000);

loadLogs();
updateStatus();
updateModelInfo();
connectSSE();
updateGhStatus();
</script>
</body>
</html>
